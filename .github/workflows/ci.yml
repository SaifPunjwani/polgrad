name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e '.[dev]'
      - name: ruff check
        run: ruff check src tests examples tools
      - name: ruff format
        run: ruff format --check src tests examples tools
      - name: mypy
        run: mypy

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.13"]
    runs-on: ${{ matrix.os }}
    env:
      HYPOTHESIS_PROFILE: ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e '.[dev]'
        if: runner.os == 'Linux'
      - name: Install (macOS)
        run: |
          python -m pip install --upgrade pip
          pip install torch
          pip install -e '.[dev]'
        if: runner.os == 'macOS'
      - name: pytest
        run: pytest -n auto

  examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e .
      - name: Run examples
        run: |
          for f in examples/*.py; do python "$f"; done
